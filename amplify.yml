# Two Amplify Hosting apps share this repo (same pattern as draughtsman):
#   1. core   — appRoot services/core, backend-only deploy
#   2. web    — appRoot apps/web, Next.js (WEB_COMPUTE); set the env var
#               CORE_APP_ID on this app to the core app's Amplify app ID.
version: 1
applications:
  - appRoot: services/core
    backend:
      phases:
        build:
          commands:
            - corepack enable
            - pnpm install --frozen-lockfile
            - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        build:
          commands:
            - mkdir ./dist && touch ./dist/index.html
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
  - appRoot: apps/web
    backend:
      phases:
        build:
          commands:
            - corepack enable
            - pnpm install --frozen-lockfile
            # Core may be mid-deploy when a push triggers both apps; wait it
            # out instead of failing (DeploymentInProgressError), and fail
            # hard if outputs never arrive so the build can't silently ship
            # the committed sandbox outputs.
            - |
              ok=0
              for i in $(seq 1 15); do
                if pnpm exec ampx generate outputs --branch $AWS_BRANCH --app-id $CORE_APP_ID --out-dir ./services/core; then ok=1; break; fi
                echo "core branch deployment in progress (attempt $i/15); retrying in 60s"
                sleep 60
              done
              [ "$ok" = "1" ]
    frontend:
      phases:
        build:
          commands:
            - pnpm exec turbo run build --filter=web
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - '**/*'
      cache:
        paths:
          - apps/web/.next/cache/**/*
          - $(pnpm store path)
      # Build from the repo root so the packaged compute bundle resolves
      # pnpm's symlinked node_modules (same as draughtsman frontend apps).
      buildPath: /
